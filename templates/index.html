<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulut Projesi | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; }
        .card { background: #1e293b; border: none; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 500px; padding: 40px; }
        .status-badge { background: #064e3b; color: #34d399; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        
        /* İstediğin Başlık Rengi Düzenlemesi */
        h3 { color: #0ea5e9; font-weight: 700; margin-bottom: 5px; } 
        
        #station { font-size: 1.1rem; color: #94a3b8; font-weight: 400; margin-bottom: 15px; }
        #value { font-size: 5rem; font-weight: 800; color: #38bdf8; line-height: 1; margin: 10px 0; }
        .unit { font-size: 2rem; color: #94a3b8; }
        #info-text { color: #fbbf24; font-size: 1.2rem; margin-top: 15px; font-weight: 600; }
        #update-time { font-size: 0.9rem; color: #64748b; margin-top: 10px; }
        
        .btn-refresh { background: #2563eb; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 600; width: 100%; transition: all 0.3s; margin-top: 25px; }
        .btn-refresh:hover { background: #1d4ed8; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card text-center">
        <div class="mb-3">
            <span class="status-badge" id="server-status">Sistem Aktif - AWS</span>
        </div>
        
        <h3>Ankara Hava Durumu</h3>
        <p id="station">Veri Çekiliyor...</p>
        
        <div id="value">--<span class="unit">°C</span></div>
        
        <div id="info-text">Hissedilen: --</div>
        <div id="update-time">Son Güncelleme: --</div>

        <button class="btn btn-primary btn-refresh" onclick="updateData()">Veriyi Güncelle</button>
    </div>
</div>

<script>
    async function updateData() {
        const btn = document.querySelector('.btn-refresh');
        const updateTimeDisp = document.getElementById('update-time');
        
        btn.innerText = "Güncelleniyor...";
        try {
            const response = await fetch('/api/status');
            const data = await response.json();
            
            document.getElementById('value').innerHTML = `${data.sicaklik}<span class="unit">°C</span>`;
            document.getElementById('station').innerText = data.istasyon;
            document.getElementById('info-text').innerText = data.mesaj;
            document.getElementById('server-status').innerText = data.durum;
            
            // Backend'den gelen düzeltilmiş Türkiye saatini basıyoruz
            updateTimeDisp.innerText = "Son Güncelleme: " + data.zaman;
            updateTimeDisp.style.color = "#f8fafc"; // Güncellenince rengi parlasın
            
            setTimeout(() => { updateTimeDisp.style.color = "#64748b"; }, 1000);

        } catch (error) {
            document.getElementById('info-text').innerText = "Hata: Sunucu Bağlantısı Kesildi";
        } finally {
            btn.innerText = "Veriyi Güncelle";
        }
    }
    // İlk açılışta veriyi çek
    updateData();
</script>
</body>
</html>
